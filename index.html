<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Further Compare | File & Text Diff, AI-powered Online Comparator, Merge Tool</title>
  <meta name="description" content="Further Compare is an enterprise-grade, AI-friendly online tool for comparing, merging, and reviewing files or text side-by-side. See differences, copy merge lines, and enjoy robust privacy.">
  <meta name="keywords" content="file diff, text compare, merge, AI, review, enterprise, document comparison, code diff, text difference, online compare, side by side, SEO friendly, AI friendly, privacy, developer tools">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://further-compare.com/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Further Compare | File & Text Diff — AI & SEO Friendly">
  <meta property="og:description" content="Professional, SEO-optimized file and text comparison/merge tool designed for enterprise, AI, and developer workflows. Compare, copy, and merge with privacy and premium UX.">
  <meta property="og:image" content="https://further-compare.com/opengraph-image.png">
  <meta property="og:url" content="https://further-compare.com/">
  <meta name="twitter:card" content="summary_large_image">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Further Compare",
    "alternateName": "FurtherCompare",
    "url": "https://further-compare.com/",
    "applicationCategory": "DeveloperApplication",
    "applicationSubCategory": "File Comparison/AI Merge Tool",
    "operatingSystem": "All",
    "featureList": [
      "Side-by-side file/text comparison",
      "Inline and per-line copy/merge",
      "AI review and automation friendly",
      "Privacy-focused and zero data tracking",
      "SEO ready and schema-optimized"
    ],
    "description": "Further Compare offers professional file, text, and code comparison with AI and SEO readiness for enterprise and developer use.",
    "softwareVersion": "1.0.0",
    "aggregateRating": {
      "@type": "AggregateRating",
      "ratingValue": "5",
      "bestRating": "5",
      "reviewCount": "100"
    }
  }
  </script>
  <link rel="stylesheet" href="style.css">
  <!-- Bootstrap CSS for professional styling -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <!-- Professional top bar/menu -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Further Compare</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu" aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMenu">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link active" href="#">Compare</a></li>
          <li class="nav-item"><a class="nav-link" href="privacy-policy.html">Privacy Policy</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="file-diff-enterprise">
    <h1>Further Compare | File & Text Diff</h1>
    <div style="display:flex;align-items:center;justify-content:center;margin-bottom:10px;">
      <label style="cursor:pointer;font-weight:500;font-size:1.06rem;">
        <input type="checkbox" id="ignoreMinor" style="margin-right:6px;vertical-align:-1px;">
        Ignore minor (whitespace/tab) changes
      </label>
    </div>
    <div class="diff-body-row" style="display:flex;align-items:stretch;width:100%;">
      <div class="diff-inputs" style="flex:1 1 0;display:flex;">
        <!-- Source Version (left) -->
        <div class="input-section fullsize">
        <div class="edit-menu-bar" id="menuBarA">
          <span class="menu-bar-group">
            <input type="file" id="fileA" accept=".txt,.md,.json,.js,.css,.html,.java,.prop,.properties,.sql,.xml,.py,.sh,.ts,.yaml,.yml,*" class="menu-file-input form-control form-control-sm" />
            <span class="menu-filename" id="fileAName"></span>
          </span>
          <button id="clearA" class="btn btn-outline-danger btn-sm" title="Clear Source">Clear</button>
          <button id="copyFileA" class="btn btn-outline-primary btn-sm" title="Copy entire Source text">
            <span aria-label="Copy full Source" style="font-size:1.1em;">📄</span>
          </button>
          <button id="downloadFileA" class="btn btn-outline-secondary btn-sm" title="Download Source as file" style="margin-left:3px;">
            <span aria-label="Download full Source" style="font-size:1.12em;">💾</span>
          </button>
          <button class="copy-btn copy-icon-btn" data-side="b" id="copyFromB" title="Copy all lines from Target"><span aria-label="Copy from Target" style="font-size:1.3em;">&#8592;</span></button>
        </div>
        <div class="input-stack">
          <div id="inputA" class="diff-edit" contenteditable="true" spellcheck="false" aria-label="Source Version" data-placeholder="Source Version"></div>
        </div>
      </div>
      <!-- Target Version (right) -->
      <div class="input-section fullsize">
        <div class="edit-menu-bar" id="menuBarB">
          <span class="menu-bar-group">
            <input type="file" id="fileB" accept=".txt,.md,.json,.js,.css,.html,.java,.prop,.properties,.sql,.xml,.py,.sh,.ts,.yaml,.yml,*" class="menu-file-input form-control form-control-sm" />
            <span class="menu-filename" id="fileBName"></span>
          </span>
          <button id="clearB" class="btn btn-outline-danger btn-sm" title="Clear Target">Clear</button>
          <button id="copyFileB" class="btn btn-outline-primary btn-sm" title="Copy entire Target text">
            <span aria-label="Copy full Target" style="font-size:1.1em;">📄</span>
          </button>
          <button id="downloadFileB" class="btn btn-outline-secondary btn-sm" title="Download Target as file" style="margin-left:3px;">
            <span aria-label="Download full Target" style="font-size:1.12em;">💾</span>
          </button>
          <button class="copy-btn copy-icon-btn" data-side="a" id="copyFromA" title="Copy all lines from Source"><span aria-label="Copy from Source" style="font-size:1.3em;">&#8594;</span></button>
        </div>
        <div class="input-stack">
          <div id="inputB" class="diff-edit" contenteditable="true" spellcheck="false" aria-label="Target Version" data-placeholder="Target Version"></div>
        </div>
      </div>
      <!-- Preview gutter -->
      <div id="diffPreview" class="diff-preview" aria-label="Difference Preview" style="width:24px;min-width:24px;max-width:24px;border-left:1.5px solid #e0e6f3;margin-left:6px;display:flex;align-items:center;">
        <!-- generated preview will go here -->
      </div>
    </div>
  </div>
  <!-- Bootstrap JS for responsive nav (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>

  <!-- Professional Footer -->
  <footer class="bg-light text-center text-muted py-1" style="border-top:1px solid #e2e8f0;">
    <div class="">
      <small>&copy; 2026 Further Compare &middot; All Rights Reserved &middot; <a href="privacy-policy.html">Privacy Policy</a></small>
    </div>
  </footer>
</body>
</html>
